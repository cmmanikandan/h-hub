<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Tool - H-Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .result.show {
            display: block;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ffeaa7;
            font-size: 13px;
        }

        .test-accounts {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #b3d9ff;
            font-size: 13px;
        }

        .test-accounts h3 {
            color: #004085;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .test-accounts ul {
            list-style: none;
            padding-left: 0;
        }

        .test-accounts li {
            padding: 5px 0;
            color: #004085;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Password Reset Tool</h1>
        <p class="subtitle">Development utility for resetting user passwords</p>

        <div class="warning">
            ⚠️ <strong>Development Only:</strong> This tool is for testing purposes. Remove in production!
        </div>

        <div class="test-accounts">
            <h3>📋 Pre-existing Test Accounts:</h3>
            <ul>
                <li>• admin@hhub.com (Admin)</li>
                <li>• test@example.com (User)</li>
            </ul>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>

            <button type="submit" id="submitBtn">Reset Password</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            resultDiv.classList.remove('show', 'success', 'error');

            try {
                const response = await fetch('http://localhost:5000/api/debug/reset-user-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success show';
                    resultDiv.innerHTML = `
                        ✅ <strong>Success!</strong><br>
                        Password updated for: ${email}<br>
                        New password: ${newPassword}<br><br>
                        You can now login with these credentials!
                    `;
                    form.reset();
                } else {
                    resultDiv.className = 'result error show';
                    resultDiv.textContent = '❌ Error: ' + data.error;
                }
            } catch (error) {
                resultDiv.className = 'result error show';
                resultDiv.textContent = '❌ Connection error. Is the backend running on port 5000?';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
